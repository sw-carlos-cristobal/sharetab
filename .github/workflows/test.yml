name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sharetab
          POSTGRES_PASSWORD: sharetab
          POSTGRES_DB: sharetab
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Resolve CI auth secret
        id: auth
        env:
          CI_AUTH_SECRET: ${{ secrets.CI_AUTH_SECRET }}
        run: |
          if [ -n "$CI_AUTH_SECRET" ]; then
            echo "secret=$CI_AUTH_SECRET" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ]; then
            # Forked PRs cannot access repo secrets — generate a per-run ephemeral secret
            echo "secret=$(openssl rand -base64 32)" >> "$GITHUB_OUTPUT"
          else
            echo "::error::CI_AUTH_SECRET is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to database
        env:
          DATABASE_URL: postgresql://sharetab:sharetab@localhost:5432/sharetab
        run: npx prisma db push

      - name: Seed database
        env:
          DATABASE_URL: postgresql://sharetab:sharetab@localhost:5432/sharetab
        run: npm run db:seed

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        env:
          DATABASE_URL: postgresql://sharetab:sharetab@localhost:5432/sharetab
          NEXTAUTH_SECRET: ${{ steps.auth.outputs.secret }}
          AUTH_SECRET: ${{ steps.auth.outputs.secret }}
          AUTH_TRUST_HOST: "true"
          ADMIN_EMAIL: alice@example.com
          AI_PROVIDER: mock
        run: npm run build

      - name: Run tests
        env:
          DATABASE_URL: postgresql://sharetab:sharetab@localhost:5432/sharetab
          NEXTAUTH_SECRET: ${{ steps.auth.outputs.secret }}
          AUTH_SECRET: ${{ steps.auth.outputs.secret }}
          AUTH_TRUST_HOST: "true"
          NEXTAUTH_URL: http://localhost:3000
          BASE_URL: http://localhost:3000
          AUTH_RATE_LIMIT_MAX: "1000"
          REGISTER_RATE_LIMIT_MAX: "1000"
          ADMIN_EMAIL: alice@example.com
          AI_PROVIDER: mock
          RUN_AI_TESTS: "1"
          EMAIL_SERVER_HOST: localhost
          EMAIL_SERVER_PORT: "2525"
        run: |
          # Start a dummy SMTP server for magic link tests (accepts all mail, delivers nothing)
          node scripts/mock-smtp.mjs 2525 &
          npm run start &
          npx wait-on http://localhost:3000/api/health --timeout 30000
          npx playwright test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
