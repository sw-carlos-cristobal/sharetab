name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  packages: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Bump version
        id: bump
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          # Find the last version tag, or use the initial commit
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)

          echo "Generating changelog from $LAST_TAG to HEAD..."

          # Build changelog from conventional commits
          {
            echo "## What's Changed"
            echo ""

            # Features
            FEATURES=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s|%h" --grep="^feat" | while IFS='|' read -r msg hash; do
              desc=$(echo "$msg" | sed 's/^feat: //;s/^feat(\([^)]*\)): /\1: /')
              echo "- $desc ($hash)"
            done)
            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo "$FEATURES"
              echo ""
            fi

            # Fixes
            FIXES=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s|%h" --grep="^fix" | while IFS='|' read -r msg hash; do
              desc=$(echo "$msg" | sed 's/^fix: //;s/^fix(\([^)]*\)): /\1: /')
              echo "- $desc ($hash)"
            done)
            if [ -n "$FIXES" ]; then
              echo "### Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            # Other notable changes (refactor, perf, ci, test, docs)
            OTHERS=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s|%h" \
              --grep="^refactor" --grep="^perf" --grep="^ci" --grep="^test" --grep="^docs" \
              | while IFS='|' read -r msg hash; do
              echo "- $msg ($hash)"
            done)
            if [ -n "$OTHERS" ]; then
              echo "### Other Changes"
              echo "$OTHERS"
              echo ""
            fi

            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$LAST_TAG...v${{ steps.bump.outputs.version }}"
          } > changelog.md

          # Also store for the release body
          cat changelog.md

          # Store multiline output
          {
            echo "body<<CHANGELOG_EOF"
            cat changelog.md
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG.md
        run: |
          NEW_VERSION="${{ steps.bump.outputs.version }}"
          DATE=$(date +%Y-%m-%d)

          # Create header for this release
          {
            echo "# Changelog"
            echo ""
            echo "## [v${NEW_VERSION}] - ${DATE}"
            echo ""
            # Skip the "## What's Changed" header from generated changelog
            tail -n +3 changelog.md
            echo ""
          } > changelog_header.md

          if [ -f CHANGELOG.md ]; then
            # Append existing changelog (skip its top-level "# Changelog" header)
            tail -n +2 CHANGELOG.md >> changelog_header.md
          fi

          mv changelog_header.md CHANGELOG.md
          rm -f changelog.md

      - name: Commit version bump and changelog
        run: |
          git add package.json CHANGELOG.md
          git commit -m "chore(release): v${{ steps.bump.outputs.version }}"

      - name: Create tag
        run: git tag "v${{ steps.bump.outputs.version }}"

      - name: Push commit and tag
        run: |
          git push origin main
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump.outputs.version }}"
          name: "v${{ steps.bump.outputs.version }}"
          body: ${{ steps.changelog.outputs.body }}
          generate_release_notes: false

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=v${{ steps.bump.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.bump.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
