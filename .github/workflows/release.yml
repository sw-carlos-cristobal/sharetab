name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prepare-release
  cancel-in-progress: false

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare release branch and PR
        id: prepare
        run: |
          node scripts/release-prepare.mjs "${{ inputs.bump }}" --github-output "$GITHUB_OUTPUT"

      - name: Summarize
        run: |
          {
            echo "Prepared release branch: \`${{ steps.prepare.outputs.branch }}\`"
            echo ""
            echo "Version: \`v${{ steps.prepare.outputs.version }}\`"
            echo ""
            echo "Pull request: ${{ steps.prepare.outputs.pr_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
