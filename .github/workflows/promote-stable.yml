name: Promote to Stable

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag or commit SHA to promote (e.g. build/2026.05.08.1 or abc1234). Defaults to latest main."
        required: false
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: promote-stable
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve ref
        id: resolve
        run: |
          REF="${{ inputs.ref }}"
          if [ -z "$REF" ]; then
            REF="main"
          fi
          FULL_SHA=$(git rev-parse "$REF")
          SHORT_SHA=$(echo "$FULL_SHA" | cut -c1-7)
          echo "sha=${FULL_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"

      - name: Move stable tag
        run: |
          git tag -f stable "${{ steps.resolve.outputs.sha }}"
          git push -f origin stable

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag Docker image as stable
        run: |
          SHA_TAG="${{ steps.resolve.outputs.sha }}"
          SHORT="${{ steps.resolve.outputs.short_sha }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          # Try full SHA tag first, then short SHA
          if docker buildx imagetools inspect "${IMAGE}:${SHA_TAG}" >/dev/null 2>&1; then
            SOURCE="${IMAGE}:${SHA_TAG}"
          elif docker buildx imagetools inspect "${IMAGE}:${SHORT}" >/dev/null 2>&1; then
            SOURCE="${IMAGE}:${SHORT}"
          else
            echo "::error::No Docker image found for SHA ${SHORT}. Build may still be in progress."
            exit 1
          fi

          docker buildx imagetools create --tag "${IMAGE}:stable" "${SOURCE}"
          echo "Tagged ${SOURCE} as ${IMAGE}:stable"

      - name: Summary
        run: |
          {
            echo "## Promoted to stable"
            echo ""
            echo "- **Ref:** \`${{ steps.resolve.outputs.ref }}\`"
            echo "- **SHA:** \`${{ steps.resolve.outputs.short_sha }}\`"
            echo "- **Docker:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable\`"
            echo ""
            echo "Update your Unraid container to pull the \`stable\` tag."
          } >> "$GITHUB_STEP_SUMMARY"
