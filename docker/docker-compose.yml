services:
  sharetab:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        COMMIT_SHA: ${COMMIT_SHA:-unknown}
    image: sharetab:latest
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DB_USER=${DB_USER:-sharetab}
      - DB_PASSWORD=${DB_PASSWORD:-sharetab}
      - DB_NAME=${DB_NAME:-sharetab}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
      - AUTH_SECRET=${AUTH_SECRET:-}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-false}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - AI_PROVIDER_PRIORITY=${AI_PROVIDER_PRIORITY:-openai,ocr}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OPENAI_CODEX_MODEL=${OPENAI_CODEX_MODEL:-gpt-5.4}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-opus-4-6}
      - ANTHROPIC_HEALTH_MODEL=${ANTHROPIC_HEALTH_MODEL:-claude-haiku-4-5-20251001}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llava}
      - EMAIL_SERVER_HOST=${EMAIL_SERVER_HOST:-}
      - EMAIL_SERVER_PORT=${EMAIL_SERVER_PORT:-587}
      - EMAIL_SERVER_USER=${EMAIL_SERVER_USER:-}
      - EMAIL_SERVER_PASSWORD=${EMAIL_SERVER_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - MERIDIAN_PORT=${MERIDIAN_PORT:-3457}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - UPLOAD_DIR=/app/uploads
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-10}
      - AUTH_RATE_LIMIT_MAX=${AUTH_RATE_LIMIT_MAX:-5}
      - REGISTER_RATE_LIMIT_MAX=${REGISTER_RATE_LIMIT_MAX:-10}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - uploads:/app/uploads
      - claude:/app/claude
      - chatgpt:/app/chatgpt
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
  uploads:
  claude:
  chatgpt:
