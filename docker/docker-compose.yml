services:
  sharetab:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: sharetab:latest
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DB_USER=${DB_USER:-sharetab}
      - DB_PASSWORD=${DB_PASSWORD:-sharetab}
      - DB_NAME=${DB_NAME:-sharetab}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-}
      - AUTH_SECRET=${AUTH_SECRET:-}
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-false}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llava}
      - EMAIL_SERVER_HOST=${EMAIL_SERVER_HOST:-}
      - EMAIL_SERVER_PORT=${EMAIL_SERVER_PORT:-587}
      - EMAIL_SERVER_USER=${EMAIL_SERVER_USER:-}
      - EMAIL_SERVER_PASSWORD=${EMAIL_SERVER_PASSWORD:-}
      - EMAIL_FROM=${EMAIL_FROM:-}
      - UPLOAD_DIR=/app/uploads
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-10}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - uploads:/app/uploads
      - ${CLAUDE_CREDENTIALS_PATH:-~/.claude/.credentials.json}:/root/.claude/.credentials.json:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Meridian: proxies Claude Max subscription as a standard Anthropic API (~3-5s vs ~22s claude-sdk)
  # Build once: docker compose --profile meridian build meridian
  # Run:        docker compose --profile meridian up -d
  # ShareTab config: AI_PROVIDER=claude, ANTHROPIC_BASE_URL=http://meridian:3456, ANTHROPIC_API_KEY=x
  meridian:
    build: https://github.com/rynfar/meridian.git
    image: meridian:local
    profiles: [meridian]
    environment:
      - MERIDIAN_HOST=0.0.0.0
    volumes:
      - ${CLAUDE_DIR:-~/.claude}:/home/claude/.claude:rw
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
