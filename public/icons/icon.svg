<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="112" fill="#059669"/>

  <!-- Receipt -->
  <path d="M160 96h192v320l-24-16-24 16-24-16-24 16-24-16-24 16-24-16-24 16V96z" fill="white" opacity="0.95"/>

  <!-- Receipt content -->
  <rect x="192" y="140" width="128" height="10" rx="5" fill="#059669" opacity="0.25"/>
  <rect x="192" y="168" width="96" height="8" rx="4" fill="#059669" opacity="0.18"/>
  <rect x="192" y="192" width="112" height="8" rx="4" fill="#059669" opacity="0.18"/>
  <rect x="192" y="216" width="80" height="8" rx="4" fill="#059669" opacity="0.18"/>

  <!-- Separator -->
  <rect x="192" y="248" width="128" height="2" rx="1" fill="#059669" opacity="0.12"/>

  <!-- Total -->
  <rect x="192" y="268" width="72" height="12" rx="6" fill="#059669" opacity="0.4"/>

  <!-- Share icon — outline circles with thick connecting lines -->
  <g transform="translate(256, 345) scale(0.52)">
    <!-- Connecting lines (drawn first, behind circles) -->
    <line x1="-48" y1="0" x2="48" y2="-52" stroke="#059669" stroke-width="10" stroke-linecap="round"/>
    <line x1="-48" y1="0" x2="48" y2="52" stroke="#059669" stroke-width="10" stroke-linecap="round"/>

    <!-- Left dot -->
    <circle cx="-48" cy="0" r="22" fill="white" stroke="#059669" stroke-width="8"/>

    <!-- Top-right dot -->
    <circle cx="48" cy="-52" r="22" fill="white" stroke="#059669" stroke-width="8"/>

    <!-- Bottom-right dot -->
    <circle cx="48" cy="52" r="22" fill="white" stroke="#059669" stroke-width="8"/>
  </g>
</svg>
